name: Reproducibility Check — ESBMC-Arduino

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'

env:
  ZENODO_DOI: "10.5281/zenodo.21034231"
  ARTIFACT_URL: "https://zenodo.org/records/21034231/files/esbmc-arduino-artifact.tar.gz"

jobs:
  reproduce:
    name: Reproduce on Ubuntu 22.04 (bare-metal)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Download artifact + checksums from Zenodo
        run: |
          SHA_URL="${ARTIFACT_URL%/*}/SHA256SUMS"
          wget --progress=dot:giga --retry-connrefused --tries=3 \
               -O esbmc-arduino-artifact.tar.gz "$ARTIFACT_URL"
          wget --retry-connrefused --tries=3 -O SHA256SUMS "$SHA_URL"

      - name: Verify SHA-256 integrity
        run: |
          cat SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Extract artifact
        run: |
          mkdir -p artifact
          tar -xzf esbmc-arduino-artifact.tar.gz -C artifact --strip-components=1
          ls -la artifact/

      - name: Cache ESBMC build
        id: cache-esbmc
        uses: actions/cache@v4
        with:
          path: ~/.esbmc-arduino
          key: esbmc-arduino-v2-${{ runner.os }}-${{ hashFiles('artifact/setup.sh', 'artifact/esbmc-src.tar.gz') }}

      - name: Pre-install Frama-C system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgtksourceview-3.0-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run setup.sh
        working-directory: artifact
        run: |
          chmod +x setup.sh
          bash setup.sh
        env:
          DEBIAN_FRONTEND: noninteractive
          OPAMYES: "1"
          OPAM_ASSUME_DEPEXTS: "true"

      - name: Verify ESBMC (Z3 backend + HAL annotator present)
        working-directory: artifact
        run: |
          ESBMC="$HOME/.esbmc-arduino/esbmc-src/build/src/esbmc/esbmc"
          test -x "$ESBMC" || { echo "::error::ESBMC binary not found at $ESB
          "$ESBMC" --version
          out=$("$ESBMC" experiments/gen/A_bug__abstract.c --z3 --no-pointer-|| true
          echo "$out"
          echo "$out" | grep -qE 'VERIFICATION (SUCCESSFUL|FAILED)' \
            || { echo "::error::ESBMC produced no verdict — Z3 backend missing"; exit 1; }
          strings "$ESBMC" | grep -q HAL_ANNOTATE \
            || { echo "::error::HAL_ANNOTATE not in binary — LD frontend not compiled"; exit 1; }
          echo "Z3 verdict produced and HAL_ANNOTATE present"

      - name: Sanity-check tools
        run: |
          echo "=== CBMC ==="; cbmc --version
          echo "=== MATIEC ==="; ~/.esbmc-arduino/matiec/iec2c -v 2>&1 | head -3 || true
          echo "=== ESBMC ==="; "$HOME/.esbmc-arduino/esbmc-src/build/src/esbad -3 || echo "ESBMC missing"
          echo "=== Frama-C ==="; eval "$(opam env --switch=frama 2>/dev/null)" || true; frama-c -version 2>/dev/null || echo "Frama-C missing"

      - name: Run reproduce.sh
        working-directory: artifact
        run: |
          chmod +x reproduce.sh
          eval "$(opam env --switch=frama 2>/dev/null)" || true
          bash reproduce.sh 2>&1 | tee reproduce.log

      - name: Upload results and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduction-results-${{ github.run_id }}
          path: |
            artifact/results/
            artifact/reproduce.log
          if-no-files-found: warn
          retention-days: 90

      - name: Write job summary
        if: always()
        run: |
          echo "## ESBMC-Arduino Reproducibility Report" >> $GITHUB_STEP_SUMM
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Zenodo DOI | \`$ZENODO_DOI\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMAR
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifact/reproduce.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 artifact/reproduce.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
