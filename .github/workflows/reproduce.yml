name: Reproducibility Check — ESBMC-Arduino

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'

env:
  ZENODO_DOI: "10.5281/zenodo.21014210"
  ARTIFACT_URL: "https://zenodo.org/records/21014210/files/esbmc-arduino-artifact.tar.gz"

jobs:
  reproduce:
    name: Reproduce on Ubuntu 22.04 (bare-metal)
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ── 1. Download do artefato Zenodo ──────────────────────────────────────
      - name: Download artifact from Zenodo
        run: |
          wget --progress=dot:giga \
               --retry-connrefused --tries=3 \
               -O artifact.tar.gz "$ARTIFACT_URL"

      - name: Verify SHA-256 checksum
        run: |
          EXPECTED="b5ae08bd02b5e98132a9cf5ddadeffd9ce9b82ca9d109f11a738f87fd070812f"
          ACTUAL=$(sha256sum artifact.tar.gz | awk '{print $1}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          [ "$EXPECTED" = "$ACTUAL" ] && echo "OK" || { echo "MISMATCH"; exit 1; }

      - name: Extract artifact
        run: |
          mkdir -p artifact
          tar -xzf artifact.tar.gz -C artifact --strip-components=1
          ls -la artifact/

      # ── 2. Cache do build do ESBMC ───────────────────────────────────────────
      - name: Cache ESBMC build
        id: cache-esbmc
        uses: actions/cache@v4
        with:
          path: |
            artifact/build
            ~/.esbmc-arduino
          key: esbmc-arduino-${{ runner.os }}-${{ hashFiles('artifact/esbmc-src.tar.gz', 'artifact/setup.sh') }}
          restore-keys: |
            esbmc-arduino-${{ runner.os }}-

      # ── 3. Dependências de sistema para Frama-C (via opam) ───────────────────
      - name: Pre-install Frama-C system dependencies
        if: steps.cache-esbmc.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgtk-3-dev libgtksourceview-3.0-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      # ── 4. Setup completo ────────────────────────────────────────────────────
      - name: Run setup.sh
        if: steps.cache-esbmc.outputs.cache-hit != 'true'
        working-directory: artifact
        run: |
          chmod +x setup.sh
          bash setup.sh
        env:
          DEBIAN_FRONTEND: noninteractive
          OPAMYES: "1"
          OPAM_ASSUME_DEPEXTS: "true"

      # ── 5. Verifica que as ferramentas estão disponíveis ─────────────────────
      - name: Sanity-check tools
        working-directory: artifact
        run: |
          echo "=== CBMC ==="
          cbmc --version
          echo "=== MATIEC ==="
          ~/.esbmc-arduino/matiec/iec2c --help 2>&1 | head -3 || true
          echo "=== ESBMC ==="
          ~/.esbmc-arduino/bin/esbmc --version 2>&1 | head -3 || \
          find ~/.esbmc-arduino -name esbmc -type f -exec {} --version \; 2>&1 | head -3 || \
          find artifact/build -name esbmc -type f -exec {} --version \; 2>&1 | head -3 || \
          echo "ESBMC not found in expected paths — check setup.sh install prefix"
          echo "=== Frama-C ==="
          eval $(opam env --switch=frama 2>/dev/null) || true
          frama-c -version 2>/dev/null || \
          ~/.opam/frama/bin/frama-c -version 2>/dev/null || \
          echo "Frama-C not found in PATH — may need eval opam env"

      # ── 6. Reprodução dos experimentos ───────────────────────────────────────
      - name: Run reproduce.sh
        working-directory: artifact
        run: |
          chmod +x reproduce.sh
          eval $(opam env --switch=frama 2>/dev/null) || true
          bash reproduce.sh 2>&1 | tee reproduce.log

      # ── 7. Upload dos resultados ─────────────────────────────────────────────
      - name: Upload results and log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduction-results-${{ github.run_id }}
          path: |
            artifact/results/
            artifact/reproduce.log
          if-no-files-found: warn
          retention-days: 90

      # ── 8. Resumo no GitHub Actions UI ───────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## ESBMC-Arduino Reproducibility Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Zenodo DOI | \`$ZENODO_DOI\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner OS  | \`ubuntu-22.04\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID     | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp  | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f artifact/reproduce.log ]; then
            echo "### Last 30 lines of reproduce.log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 artifact/reproduce.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
